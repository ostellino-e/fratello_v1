<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedido Fratello</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="theme-color" content="#2b2118" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Fratello" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <style>
    body {
      background: #f5f1ea;
    }

    .pedidoClienteWrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .pedidoClienteHeader {
      background: #2b2118;
      color: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .formatoEjemplo {
      background: #fff6d6;
      border: 1px solid #ead89a;
      border-radius: 12px;
      padding: 12px;
      margin: 12px 0;
    }

    .formatoEjemplo pre {
      white-space: pre-wrap;
      margin: 8px 0 0;
      font-family: inherit;
    }

    #pedidoCrudoCliente {
      min-height: 260px;
      font-size: 16px;
      line-height: 1.4;
    }

    .checkControlCliente {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff6d6;
      border-radius: 10px;
      padding: 12px;
      margin: 12px 0;
      font-weight: bold;
    }

    .checkControlCliente input {
      width: auto;
      transform: scale(1.3);
    }
  </style>
</head>
<body>
  <div class="pedidoClienteWrap">
    <div class="pedidoClienteHeader">
      <h1>Fratello</h1>
      <p>Cargá tu pedido para la próxima entrega</p>
    </div>

    <section class="card">
      <label>Nombre del cliente / sucursal</label>
      <input id="clientePedido" placeholder="Ej: Pedernera y Colombia" />

      <label>Fecha de entrega</label>
      <input id="fechaEntrega" type="date" />

      <div class="formatoEjemplo">
        <strong>Formato obligatorio: una línea por producto</strong>
        <pre>Pan 12 kg
Medialunas 4 docenas
Raspaditas 20 unidades
Pan para choripán 50 unidades
Bizcocho hojaldre 1,5 kg</pre>
      </div>

      <label>Pedido</label>
      <textarea id="pedidoCrudoCliente" placeholder="Pegá o escribí acá tu pedido, una línea por producto..."></textarea>

      <label class="checkControlCliente">
        <input type="checkbox" id="confirmoPedidoCliente">
        Confirmo que revisé el pedido y está correcto
      </label>

      <button id="btnEnviarPedidoCliente" class="primary" type="button">Enviar pedido</button>
      <div id="mensajeCliente" class="mensajePedido"></div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyDPg7UWyqOKYxP5qEelgqjcfTjXD3BXYQY",
  authDomain: "fratello-c1765.firebaseapp.com",
  projectId: "fratello-c1765",
  storageBucket: "fratello-c1765.firebasestorage.app",
  messagingSenderId: "897400694131",
  appId: "1:897400694131:web:4262fca5934bcc56629106",
  measurementId: "G-DSFYHG7QFV"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const productosCliente = [
      { id: "CHIC", nombre: "Chicharrón", unidad: "unidad", aliases: ["chicharron"] },
      { id: "TREN", nombre: "Trenzas", unidad: "unidad", aliases: ["trenza", "trenzas"] },
      { id: "RASP", nombre: "Raspaditas", unidad: "unidad", aliases: ["raspadita", "raspaditas"] },
      { id: "CORD_S", nombre: "Corderos salados", unidad: "unidad", aliases: ["cordero salado", "corderos salados"] },
      { id: "CORD_D", nombre: "Corderos dulces", unidad: "unidad", aliases: ["cordero dulce", "corderos dulces"] },
      { id: "RASQ_G", nombre: "Rasquetas grasas", unidad: "unidad", aliases: ["rasqueta grasa", "rasquetas grasa", "rasquetas grasas"] },
      { id: "RASQ_M", nombre: "Rasquetas manteca", unidad: "unidad", aliases: ["rasqueta manteca", "rasquetas manteca"] },
      { id: "BIZ_H", nombre: "Bizcocho hojaldre", unidad: "kg", aliases: ["bizcocho hojaldre", "bizcochos hojaldre"] },
      { id: "LIB_MEM", nombre: "Librito membrillo", unidad: "kg", aliases: ["librito membrillo", "libritos membrillo"] },
      { id: "BIZ_G", nombre: "Bizcochos de grasa", unidad: "kg", aliases: ["bizcocho de grasa", "bizcochos de grasa"] },
      { id: "FAC_SUR", nombre: "Facturas surtidas", unidad: "docena", aliases: ["factura surtida", "facturas surtidas"] },
      { id: "MED", nombre: "Medialunas", unidad: "docena", aliases: ["medialuna", "medialunas"] },
      { id: "PAN", nombre: "Pan", unidad: "kg", aliases: ["pan"] },
      { id: "CAS", nombre: "Caserito", unidad: "kg", aliases: ["caserito", "caseritos"] },
      { id: "PAN_CAS", nombre: "Pan casero", unidad: "unidad", aliases: ["pan casero"] },
      { id: "PALM", nombre: "Palmeritas", unidad: "kg", aliases: ["palmerita", "palmeritas"] },
      { id: "PAN_SAL", nombre: "Pan de salvado", unidad: "kg", aliases: ["pan de salvado", "pan salvado"] },
      { id: "PREP", nombre: "Prepizzas", unidad: "unidad", aliases: ["prepizza", "prepizzas"] },
      { id: "PAN_INT", nombre: "Pan integral", unidad: "unidad", aliases: ["pan integral"] },
      { id: "BUD", nombre: "Budín", unidad: "unidad", aliases: ["budin", "budines"] },
      { id: "TAP_MAI", nombre: "Tapitas maicena", unidad: "kg", aliases: ["tapitas maicena", "tapitas de maicena"] },
      { id: "FROLA", nombre: "Frolas", unidad: "kg", aliases: ["frola", "frolas"] },
      { id: "SCON", nombre: "Scon", unidad: "kg", aliases: ["scon", "scones"] },
      { id: "PEPAS", nombre: "Pepas", unidad: "kg", aliases: ["pepa", "pepas"] },
      { id: "CANON", nombre: "Cañoncitos", unidad: "kg", aliases: ["cañoncito", "cañoncitos", "canoncito", "canoncitos"] },
      { id: "PIZZ_KG", nombre: "Pizzetas x kg", unidad: "kg", aliases: ["pizzetas x kg", "pizzetas"] }
    ];

    function hoyISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function normalizar(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function extraerCantidad(linea) {
      const match = String(linea).replace(",", ".").match(/\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : 0;
    }

    function detectarUnidad(linea, unidadDefault = "unidad") {
      const t = normalizar(linea);

      if (t.includes("kg") || t.includes("kilo")) return "kg";
      if (t.includes("doc")) return "docena";
      if (t.includes("unid") || t.includes("unidad") || t.includes(" u")) return "unidad";

      return unidadDefault;
    }

    function buscarProducto(lineaNormalizada) {
      const candidatos = [];

      productosCliente.forEach(p => {
        p.aliases.forEach(alias => {
          const aliasN = normalizar(alias);
          if (lineaNormalizada.includes(aliasN)) {
            candidatos.push({ producto: p, largo: aliasN.length });
          }
        });
      });

      candidatos.sort((a, b) => b.largo - a.largo);
      return candidatos.length ? candidatos[0].producto : null;
    }

    function nombreProductoNuevo(original) {
      return String(original)
        .replace(/\d+(?:[.,]\d+)?/g, "")
        .replace(/\bkg\b/gi, "")
        .replace(/\bkilos?\b/gi, "")
        .replace(/\bunidad(es)?\b/gi, "")
        .replace(/\bunid\b/gi, "")
        .replace(/\bu\b/gi, "")
        .replace(/\bdoc(ena|enas)?\b/gi, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function procesarPedidoCrudo(texto, cliente, fecha) {
      const items = [];

      texto.split(/\r?\n/).map(l => l.trim()).filter(Boolean).forEach(original => {
        const normal = normalizar(original);
        const cantidad = extraerCantidad(original);

        if (!cantidad) return;

        let producto = buscarProducto(normal);

        // Evita interpretar "pan para choripán" como pan común.
        if (producto && producto.id === "PAN" && normal !== "pan" && !normal.match(/^pan\s+\d/)) {
          producto = null;
        }

        if (producto) {
          items.push({
            fecha,
            cliente,
            productoId: producto.id,
            producto: producto.nombre,
            cantidad,
            unidad: detectarUnidad(original, producto.unidad),
            estado: "OK",
            observacion: "",
            original
          });
        } else {
          const nombre = nombreProductoNuevo(original) || original;
          const id = "EXTRA_" + normalizar(nombre)
            .replace(/[^a-z0-9]/g, "_")
            .replace(/_+/g, "_")
            .replace(/^_|_$/g, "")
            .toUpperCase();

          items.push({
            fecha,
            cliente,
            productoId: id,
            producto: nombre + " *",
            cantidad,
            unidad: detectarUnidad(original, "unidad"),
            estado: "OK",
            observacion: "Producto nuevo/no habitual",
            original
          });
        }
      });

      return items;
    }

    function mostrarMensaje(texto, error = false) {
      const el = document.getElementById("mensajeCliente");
      el.textContent = texto;
      el.style.display = "block";
      el.style.background = error ? "#ffe1de" : "#eaf7eb";
      el.style.color = error ? "#9b1c1c" : "#1f7a35";
    }

    async function enviarPedidoCliente() {
      const cliente = document.getElementById("clientePedido").value.trim();
      const fecha = document.getElementById("fechaEntrega").value || hoyISO();
      const texto = document.getElementById("pedidoCrudoCliente").value.trim();
      const confirmado = document.getElementById("confirmoPedidoCliente").checked;
      const boton = document.getElementById("btnEnviarPedidoCliente");

      if (!cliente) {
        alert("Escribí el nombre del cliente o sucursal.");
        return;
      }

      if (!texto) {
        alert("Pegá o escribí el pedido.");
        return;
      }

      if (!confirmado) {
        alert("Primero confirmá que revisaste el pedido.");
        return;
      }

      const items = procesarPedidoCrudo(texto, cliente, fecha);

      if (!items.length) {
        mostrarMensaje("No se detectaron productos con cantidad. Usá el formato: Producto + cantidad + unidad.", true);
        return;
      }

      const nuevoPedido = {
        id: Date.now(),
        fecha,
        cliente,
        textoOriginal: texto,
        origen: "formulario_cliente",
        items
      };

      if (boton) {
        boton.disabled = true;
        boton.textContent = "Enviando...";
      }

      mostrarMensaje("Enviando pedido...");

      try {
        const estadoRef = db.collection("fratello").doc("estado");

        await db.runTransaction(async transaction => {
          const doc = await transaction.get(estadoRef);
          const data = doc.exists ? doc.data() : {};
          const pedidosActuales = Array.isArray(data.pedidos) ? data.pedidos : [];

          transaction.set(estadoRef, {
            ...data,
            pedidos: [...pedidosActuales, nuevoPedido],
            pedidosConfirmados: false,
            actualizado: new Date().toISOString()
          });
        });

        document.getElementById("pedidoCrudoCliente").value = "";
        document.getElementById("confirmoPedidoCliente").checked = false;
        mostrarMensaje("Pedido cargado correctamente. Gracias.");
      } catch (error) {
        console.error(error);
        mostrarMensaje("No se pudo enviar el pedido. Intentá nuevamente.", true);
      } finally {
        if (boton) {
          boton.disabled = false;
          boton.textContent = "Enviar pedido";
        }
      }
    }

    document.getElementById("fechaEntrega").value = hoyISO();
    document.getElementById("btnEnviarPedidoCliente").onclick = enviarPedidoCliente;
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", async () => {
        try {
          const registros = await navigator.serviceWorker.getRegistrations();

          for (const registro of registros) {
            const urlActiva =
              registro.active?.scriptURL ||
              registro.waiting?.scriptURL ||
              registro.installing?.scriptURL ||
              "";

            if (urlActiva && !urlActiva.includes("service-worker.js?v=0792")) {
              await registro.unregister();
            }
          }

          const registro = await navigator.serviceWorker.register("service-worker.js?v=0792", {
            scope: "./",
            updateViaCache: "none"
          });

          await registro.update();
        } catch (error) {
          console.error("Error registrando Service Worker:", error);
        }
      });
    }
  </script>
</body>
</html>
