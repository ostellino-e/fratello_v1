<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pedido Fratello</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      background: #f5f1ea;
    }

    .pedidoClienteWrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .pedidoClienteHeader {
      background: #2b2118;
      color: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .productoPedidoCliente {
      display: grid;
      grid-template-columns: 1fr 110px 90px;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #eadfce;
      padding: 8px 0;
    }

    .productoPedidoCliente input {
      margin: 0;
    }

    @media (max-width: 600px) {
      .productoPedidoCliente {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="pedidoClienteWrap">
    <div class="pedidoClienteHeader">
      <h1>Fratello</h1>
      <p>Cargá tu pedido para mañana</p>
    </div>

    <section class="card">
      <label>Nombre del cliente / sucursal</label>
      <input id="clientePedido" placeholder="Ej: Giuliano, Laura, Fratello..." />

      <label>Fecha de entrega</label>
      <input id="fechaEntrega" type="date" />

      <h2>Productos</h2>
      <p class="hint">Completá solo los productos que necesitás.</p>

      <div id="listaProductosCliente"></div>

      <label>Producto especial / observación</label>
      <textarea id="observacionPedido" placeholder="Ej: Pan para choripán 50 unidades, figacitas 30, etc."></textarea>

      <button id="btnEnviarPedidoCliente" class="primary" type="button">Enviar pedido</button>
      <div id="mensajeCliente" class="mensajePedido"></div>
    </section>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyDPg7UWyqOKYxP5qEelgqjcfTjXD3BXYQY",
  authDomain: "fratello-c1765.firebaseapp.com",
  projectId: "fratello-c1765",
  storageBucket: "fratello-c1765.firebasestorage.app",
  messagingSenderId: "897400694131",
  appId: "1:897400694131:web:4262fca5934bcc56629106",
  measurementId: "G-DSFYHG7QFV"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const productosCliente = [
      { id: "CHIC", nombre: "Chicharrón", unidad: "unidad" },
      { id: "TREN", nombre: "Trenzas", unidad: "unidad" },
      { id: "RASP", nombre: "Raspaditas", unidad: "unidad" },
      { id: "CORD_S", nombre: "Corderos salados", unidad: "unidad" },
      { id: "CORD_D", nombre: "Corderos dulces", unidad: "unidad" },
      { id: "RASQ_G", nombre: "Rasquetas grasas", unidad: "unidad" },
      { id: "RASQ_M", nombre: "Rasquetas manteca", unidad: "unidad" },
      { id: "BIZ_H", nombre: "Bizcocho hojaldre", unidad: "kg" },
      { id: "LIB_MEM", nombre: "Librito membrillo", unidad: "kg" },
      { id: "BIZ_G", nombre: "Bizcochos de grasa", unidad: "kg" },
      { id: "FAC_SUR", nombre: "Facturas surtidas", unidad: "docena" },
      { id: "MED", nombre: "Medialunas", unidad: "docena" },
      { id: "PAN", nombre: "Pan", unidad: "kg" },
      { id: "CAS", nombre: "Caserito", unidad: "kg" },
      { id: "PAN_CAS", nombre: "Pan casero", unidad: "unidad" },
      { id: "PALM", nombre: "Palmeritas", unidad: "kg" },
      { id: "PAN_SAL", nombre: "Pan de salvado", unidad: "kg" },
      { id: "PREP", nombre: "Prepizzas", unidad: "unidad" },
      { id: "PAN_INT", nombre: "Pan integral", unidad: "unidad" },
      { id: "BUD", nombre: "Budín", unidad: "unidad" },
      { id: "TAP_MAI", nombre: "Tapitas maicena", unidad: "kg" },
      { id: "FROLA", nombre: "Frolas", unidad: "kg" },
      { id: "SCON", nombre: "Scon", unidad: "kg" },
      { id: "PEPAS", nombre: "Pepas", unidad: "kg" },
      { id: "CANON", nombre: "Cañoncitos", unidad: "kg" },
      { id: "PIZZ_KG", nombre: "Pizzetas x kg", unidad: "kg" }
    ];

    function hoyISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function mostrarMensaje(texto) {
      const el = document.getElementById("mensajeCliente");
      el.textContent = texto;
      el.style.display = "block";
    }

    function renderProductosCliente() {
      const cont = document.getElementById("listaProductosCliente");
      let html = "";

      productosCliente.forEach(p => {
        html += `<div class="productoPedidoCliente">
          <strong>${p.nombre}</strong>
          <input type="number" step="0.001" min="0" data-prod="${p.id}" placeholder="0">
          <span>${p.unidad}</span>
        </div>`;
      });

      cont.innerHTML = html;
    }

    async function enviarPedidoCliente() {
      const cliente = document.getElementById("clientePedido").value.trim();
      const fecha = document.getElementById("fechaEntrega").value || hoyISO();
      const observacion = document.getElementById("observacionPedido").value.trim();

      if (!cliente) {
        alert("Escribí el nombre del cliente o sucursal.");
        return;
      }

      const items = [];

      document.querySelectorAll("[data-prod]").forEach(input => {
        const cantidad = Number(input.value || 0);
        if (cantidad > 0) {
          const p = productosCliente.find(x => x.id === input.dataset.prod);
          items.push({
            fecha,
            cliente,
            productoId: p.id,
            producto: p.nombre,
            cantidad,
            unidad: p.unidad,
            estado: "OK",
            observacion: "",
            original: `${p.nombre} ${cantidad} ${p.unidad}`
          });
        }
      });

      if (observacion) {
        items.push({
          fecha,
          cliente,
          productoId: "OBS_" + Date.now(),
          producto: "Pedido especial / observación *",
          cantidad: 1,
          unidad: "detalle",
          estado: "OK",
          observacion,
          original: observacion
        });
      }

      if (!items.length) {
        alert("Cargá al menos un producto.");
        return;
      }

      const estadoRef = db.collection("fratello").doc("estado");
      const doc = await estadoRef.get();
      const data = doc.exists ? doc.data() : {};
      const pedidos = Array.isArray(data.pedidos) ? data.pedidos : [];

      pedidos.push({
        id: Date.now(),
        fecha,
        cliente,
        textoOriginal: "Pedido cargado por formulario",
        items
      });

      await estadoRef.set({
        ...data,
        pedidos,
        actualizado: new Date().toISOString()
      });

      document.querySelectorAll("[data-prod]").forEach(input => input.value = "");
      document.getElementById("observacionPedido").value = "";
      mostrarMensaje("Pedido enviado correctamente. Gracias.");
    }

    document.getElementById("fechaEntrega").value = hoyISO();
    renderProductosCliente();
    document.getElementById("btnEnviarPedidoCliente").onclick = enviarPedidoCliente;
  </script>
</body>
</html>
